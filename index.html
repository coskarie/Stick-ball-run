<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스틱맨 런앤건 PVE - 멀티플레이어 연동</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }
        
        /* 로그인 스크린 UI */
        #loginScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
        }
        #loginScreen h1 {
            font-size: 50px;
            margin-bottom: 40px;
            text-shadow: 2px 2px 0 #000;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: center;
        }
        .input-group input {
            font-size: 24px;
            padding: 15px;
            width: 300px;
            text-align: center;
            border-radius: 8px;
            border: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            outline: none;
        }
        #loginScreen button {
            font-size: 24px;
            padding: 15px 60px;
            margin-top: 20px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            background-color: #d4af37;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s;
        }
        #loginScreen button:hover {
            background-color: #b5952f;
        }

        /* 게임 캔버스 및 UI (초기에는 숨김) */
        canvas {
            background-color: #ffffff; 
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            display: none; 
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: black;
            font-weight: bold;
            font-size: 20px;
            pointer-events: none;
            background: rgba(255,255,255,0.8);
            padding: 15px;
            border-radius: 8px;
            line-height: 1.6;
            display: none; 
            z-index: 10;
        }
        #alertUI {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: red;
            font-weight: bold;
            font-size: 40px;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h1>[ 스틱맨 총게임 ]</h1>
        <div class="input-group">
            <input type="text" id="playerNameInput" placeholder="이름을 입력하세요" autocomplete="off" maxlength="10">
        </div>
        <div class="input-group">
            <input type="number" id="roomNumberInput" placeholder="룸 번호 (1~9)" min="1" max="9">
        </div>
        <button id="startButton">입장하기</button>
    </div>

    <div id="ui">
        <div>플레이어: <span id="playerInfoUI" style="color: #2e8b57;">-</span></div>
        <hr style="border: 1px solid #ccc; margin: 5px 0;">
        <div>무기 (1~4, Q): <span id="currentWeaponUI" style="color: blue;">권총</span> <span id="ammoUI">[10 / 10]</span></div>
        <div>소지금: <span id="moneyUI" style="color: #d4af37;">1500</span> $</div>
        <div>진행 거리: <span id="distanceUI">0</span> m</div>
        <div>체력: <span id="hpUI" style="color: red;">1250 / 1250</span></div>
    </div>
    <div id="alertUI">돈이 부족합니다!</div>
    
    <canvas id="gameCanvas" width="1200" height="700"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- [추가] 멀티플레이어 소켓 설정 및 방장 시스템 ---
const socket = io();
const otherPlayers = {}; 
let isHost = false; 

socket.on('initData', (data) => {
    isHost = data.isHost;
    if (isHost) document.getElementById('playerInfoUI').innerText += " (방장)";
    data.players.forEach(p => {
        if (p.id !== socket.id) otherPlayers[p.id] = p;
    });
});

socket.on('hostAssigned', () => {
    isHost = true;
    const currentText = document.getElementById('playerInfoUI').innerText;
    if (!currentText.includes("(방장)")) {
        document.getElementById('playerInfoUI').innerText += " (방장)";
    }
});

socket.on('newPlayer', (p) => { otherPlayers[p.id] = p; });
socket.on('playerMoved', (data) => { if (otherPlayers[data.id]) otherPlayers[data.id] = data; });
socket.on('playerDisconnected', (id) => { delete otherPlayers[id]; });
socket.on('remoteBullet', (bData) => { 
    if (bData.weaponType === 'barricade') {
        barricades.push(bData);
    } else {
        bullets.push(bData); 
    }
});
socket.on('enemySpawned', (eData) => {
    enemies.push(eData);
});
socket.on('updateEnemyHp', ({ enemyId, damage }) => {
    let e = enemies.find(en => en.id === enemyId);
    if (e) e.hp -= damage;
});

// --- 게임 상태 및 입력 ---
const keys = {};
const mouse = { x: 0, y: 0, isDown: false };
let camX = 0; 
let maxDistance = 0;

let isGameStarted = false; 
let globalPlayerName = "";
let globalRoomNumber = "";

window.addEventListener('keydown', e => { 
    if (!isGameStarted) return; 
    if (player.isUpgrading) return; // [추가] 강화 중 조작 금지
    if (e.repeat) return; 

    const key = e.key.toLowerCase();
    keys[key] = true; 
    const now = Date.now();

    if (key === 'a') {
        if (now - player.lastTapA < 250 && now - player.lastDashTime > 1000) {
            player.lastDashTime = now;
            player.dashTimer = 12; 
            player.dashDirection = -1;
            for (let i = 0; i < 5; i++) sparks.push({ type: 'dust', x: player.x, y: player.y, vx: Math.random() * 6 + 2, vy: -(Math.random() * 4 + 1), life: 20 + Math.random() * 10, size: 15 + Math.random() * 10 });
        }
        player.lastTapA = now;
    }
    
    if (key === 'd') {
        if (now - player.lastTapD < 250 && now - player.lastDashTime > 1000) {
            player.lastDashTime = now;
            player.dashTimer = 12;
            player.dashDirection = 1;
            for (let i = 0; i < 5; i++) sparks.push({ type: 'dust', x: player.x, y: player.y, vx: -(Math.random() * 6 + 2), vy: -(Math.random() * 4 + 1), life: 20 + Math.random() * 10, size: 15 + Math.random() * 10 });
        }
        player.lastTapD = now;
    }

    if (key === 'z') player.isSlowWalking = !player.isSlowWalking;

    if (key === 'f') {
        if (now - player.lastBarricade > 3000) {
            player.lastBarricade = now;
            let shootY = player.isCrouching ? player.y - 23 : player.y - 38;
            let aimAngle = Math.atan2(mouse.y - shootY, (mouse.x + camX) - player.x);
            let facing = (Math.cos(aimAngle) > 0) ? 1 : -1;
            let targetX = player.x + (facing * 70); 
            let targetY = getTerrainY(targetX);     
            const newBarricade = { id: Math.random().toString(36).substr(2, 9), x: targetX, y: targetY - 600, targetY: targetY, width: 30, height: 60, hp: 500, maxHp: 500, weaponType: 'barricade' };
            barricades.push(newBarricade);
            if (isGameStarted) socket.emit('shootBullet', newBarricade); 
        }
    }

    if (key === 'r' && !player.isReloading) {
        const wData = weapons[player.weapon];
        if (player.ammo[player.weapon] < wData.maxAmmo) {
            if (player.money >= wData.reloadCost) {
                player.isReloading = true;
                player.reloadStart = Date.now();
                player.reloadProgress = 0;
            } else {
                const alertUI = document.getElementById('alertUI');
                alertUI.style.opacity = 1;
                setTimeout(() => { alertUI.style.opacity = 0; }, 1000);
            }
        }
    }
});

window.addEventListener('keyup', e => { 
    if (!isGameStarted) return;
    keys[e.key.toLowerCase()] = false; 
});

canvas.addEventListener('mousemove', e => {
    if (!isGameStarted) return;
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});
canvas.addEventListener('mousedown', () => { 
    if (!isGameStarted) return;
    mouse.isDown = true; 
    tryShoot(); 
});
canvas.addEventListener('mouseup', () => { 
    if (!isGameStarted) return;
    mouse.isDown = false; 
});

const weaponNames = { pistol: '권총', machineGun: '기관총', shotgun: '샷건', sniper: '스나이퍼', shield: '방패' };
const weaponColors = { pistol: 'black', machineGun: 'gray', shotgun: 'red', sniper: 'blue', shield: 'cyan' };

window.addEventListener('keydown', e => {
    if (!isGameStarted) return;
    if (['1','2','3','4','q'].includes(e.key.toLowerCase()) && !player.isReloading) {
        if (e.key === '1') player.weapon = 'pistol';
        if (e.key === '2') player.weapon = 'machineGun';
        if (e.key === '3') player.weapon = 'shotgun';
        if (e.key === '4') player.weapon = 'sniper';
        if (e.key.toLowerCase() === 'q') player.weapon = 'shield';
        
        const uiSpan = document.getElementById('currentWeaponUI');
        uiSpan.innerText = weaponNames[player.weapon];
        uiSpan.style.color = weaponColors[player.weapon];
    }
});

// --- 데이터 설계 ---
const weapons = {
    pistol: { type: 'single', fireRate: 300, speed: 20, damage: 15, color: 'black', maxAmmo: 10, reloadCost: 0, reloadTime: 1000 },
    machineGun: { type: 'auto', fireRate: 90, speed: 25, damage: 7, color: 'gray', maxAmmo: 50, reloadCost: 100, reloadTime: 2000, spread: 5 },
    shotgun: { type: 'single', fireRate: 1200, speed: 18, damage: 10, color: 'red', pellets: 6, spread: 35, maxAmmo: 5, reloadCost: 500, reloadTime: 3000, pierce: 0 },
    sniper: { type: 'single', fireRate: 1500, speed: 45, damage: 80, color: 'blue', minRange: 200, pierce: 3, maxAmmo: 8, reloadCost: 1000, reloadTime: 5000 },
    shield: { type: 'shield', fireRate: 9999, speed: 0, damage: 0, color: 'cyan', maxAmmo: 50, reloadCost: 0, reloadTime: 1000 } 
};

// [추가] 🚨 보스 몬스터 설정표 (여기서 숫자를 조절하세요!)
const BOSS_CONFIG = {
    baseHp: 500,        // 1500m 첫 보스의 기본 체력
    hpPerLevel: 1000,    // 다음 보스(2500m, 3500m)가 나올 때마다 추가되는 체력
    damage: 10,          // 기관총 한 발당 플레이어에게 입히는 데미지
    fireRate: 150,       // 사격 속도 (작을수록 기관총을 더 빨리 쏨. 150 = 0.15초)
    bulletSpeed: 16,     // 보스 총알이 날아오는 속도
    moveSpeed: 1.2       // 보스의 걷는 속도 (덩치가 커서 기본적으론 약간 느림)
};

const player = {
    x: 100, y: 300, vx: 0, vy: 0, speed: 6, jumpPower: -10, gravity: 0.5,
    width: 20, height: 50, 
    weapon: 'pistol', lastShot: 0, isGrounded: false,
    walkTime: 0, shootTimer: 0,
    money: 1500, hp: 1250, maxHp: 1250,   
    ammo: { pistol: 10, machineGun: 50, shotgun: 5, sniper: 8, shield: 50 },
    isReloading: false, reloadStart: 0, reloadProgress: 0,
    isCrouching: false, crouchStamina: 300, maxCrouchStamina: 300,
    aimAngle: 0, isSlowWalking: false, lastBarricade: 0, recoil: 0, 
    lastTapA: 0, lastTapD: 0, lastDashTime: 0, dashTimer: 0, dashDirection: 1,
    upgradeMilestone: 1, isUpgrading: false,
    // [추가] 다음 보스가 등장할 미터수 (시작은 1500m)
    nextBossMilestone: 1500,
    job: 'normal',           // 현재 직업
    hasDashPush: false,      // 돌격 습득 여부
    hasShieldRangeUp: false, // 쉴드 범위 확장 습득 여부
    hasAuraPower: false      // 오라 파워 습득 여부
};

const bullets = [];
const enemies = [];
const sparks = []; 
const barricades = []; 
const items = []; 

// --- 강화 시스템 UI 및 로직 ---
function createUpgradeUI() {
    const upgradeUI = document.createElement('div');
    upgradeUI.id = 'upgradeUI';
    upgradeUI.style.position = 'absolute';
    upgradeUI.style.top = '0';
    upgradeUI.style.left = '0';
    upgradeUI.style.width = '100%';
    upgradeUI.style.height = '100%';
    upgradeUI.style.backgroundColor = 'rgba(0, 0, 0, 0.85)';
    upgradeUI.style.display = 'none';
    upgradeUI.style.flexDirection = 'column';
    upgradeUI.style.justifyContent = 'center';
    upgradeUI.style.alignItems = 'center';
    upgradeUI.style.zIndex = '200';
    upgradeUI.style.fontFamily = 'Arial, sans-serif';

    upgradeUI.innerHTML = `
        <h1 style="color: #ffd700; font-size: 40px; margin-bottom: 40px; text-shadow: 2px 2px 0 #000;">[ 1000m 도달! 특성 강화 ]</h1>
        <div id="upgradeCategories" style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; max-width: 800px;"></div>
        <div id="upgradeOptions" style="display: none; flex-direction: column; gap: 15px; margin-top: 20px; align-items: center;"></div>
    `;
    document.body.appendChild(upgradeUI);
}
// 게임 시작 전에 UI 박스를 1번 만들어둡니다.
createUpgradeUI();

function showUpgradeMenu() {
    player.isUpgrading = true; // 게임 일시정지 상태 돌입
    for (let k in keys) keys[k] = false; // 움직임이 고정되지 않게 키보드 입력 강제 해제
    
    const ui = document.getElementById('upgradeUI');
    const categoriesDiv = document.getElementById('upgradeCategories');
    const optionsDiv = document.getElementById('upgradeOptions');
    ui.style.display = 'flex';
    categoriesDiv.style.display = 'flex';
    optionsDiv.style.display = 'none';

    let categories = [];
    
    // 🚨 [추가/수정] 디펜더로 전직한 상태라면 오직 '쉴드' 카테고리만 노출시킵니다.
    if (player.job === 'defender') {
        categories = [
            { name: '쉴드', id: 'shield', color: '#66ffff' }
        ];
    } else {
        // 전직 전 평민 상태일 때의 기본 카테고리 라인업
        categories = [
            { name: '권총', id: 'pistol', color: '#aaaaaa' },
            { name: '기관총', id: 'machineGun', color: '#aaaaaa' },
            { name: '샷건', id: 'shotgun', color: '#ff6666' },
            { name: '저격총', id: 'sniper', color: '#6666ff' },
            { name: '쉴드', id: 'shield', color: '#66ffff' },
            { name: '체력', id: 'health', color: '#66ff66' },
            { name: '피지컬', id: 'physical', color: '#ffcc00' }
        ];
    }

    categoriesDiv.innerHTML = '';
    categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.innerText = cat.name;
        btn.style.padding = '20px 40px';
        btn.style.fontSize = '24px';
        btn.style.fontWeight = 'bold';
        btn.style.cursor = 'pointer';
        btn.style.border = 'none';
        btn.style.borderRadius = '10px';
        btn.style.backgroundColor = '#444';
        btn.style.color = cat.color;
        btn.style.boxShadow = '0 4px 6px rgba(0,0,0,0.5)';
        btn.onmouseover = () => btn.style.backgroundColor = '#555';
        btn.onmouseout = () => btn.style.backgroundColor = '#444';
        btn.onclick = () => showOptions(cat.id, cat.name, cat.color);
        categoriesDiv.appendChild(btn);
    });
}

function showOptions(categoryId, categoryName, categoryColor) {
    const categoriesDiv = document.getElementById('upgradeCategories');
    const optionsDiv = document.getElementById('upgradeOptions');
    categoriesDiv.style.display = 'none';
    optionsDiv.style.display = 'flex';
    optionsDiv.innerHTML = `<h2 style="color: ${categoryColor}; margin-bottom: 20px;">[ ${categoryName} 강화 선택 ]</h2>`;

    let options = [];
    if (categoryId === 'pistol') {
        options = [
            { text: '공격력 +5 증가', action: () => weapons.pistol.damage += 5 },
            { text: '최대 총알 갯수 +5', action: () => { weapons.pistol.maxAmmo += 5; player.ammo.pistol += 5; } },
            { text: '공격속도 증가 (쿨타임 감소)', action: () => weapons.pistol.fireRate = Math.max(50, weapons.pistol.fireRate - 50) }
        ];
    } else if (categoryId === 'machineGun') {
        options = [
            { text: '공격력 +2 증가', action: () => weapons.machineGun.damage += 2 },
            { text: '최대 총알 갯수 +25', action: () => { weapons.machineGun.maxAmmo += 25; player.ammo.machineGun += 25; } },
            { text: '반동 및 오차범위 감소', action: () => weapons.machineGun.spread = Math.max(1, weapons.machineGun.spread - 1) }
        ];
    } else if (categoryId === 'shotgun') {
        options = [
            { text: '공격력 +3 증가', action: () => weapons.shotgun.damage += 3 },
            // [수정] 샷건 다수기(관통) +2명씩 추가로 대폭 상향!
            { text: '다수기 (관통 +2명)', action: () => weapons.shotgun.pierce += 2 },
            { text: '최대 총알 갯수 +2', action: () => { weapons.shotgun.maxAmmo += 2; player.ammo.shotgun += 2; } },
            { text: '공격속도 증가 (쿨타임 감소)', action: () => weapons.shotgun.fireRate = Math.max(300, weapons.shotgun.fireRate - 150) }
        ];
    } else if (categoryId === 'sniper') {
        options = [
            { text: '공격력 +20 증가', action: () => weapons.sniper.damage += 20 },
            { text: '최대 총알 갯수 +2', action: () => { weapons.sniper.maxAmmo += 2; player.ammo.sniper += 2; } }
        ];
    } else if (categoryId === 'shield') {
        if (player.job === 'defender') {
            // [디펜더 전용 특성] (이미 전직한 상태)
            options = [
                { text: '최대 방어 갯수 +20', action: () => { weapons.shield.maxAmmo += 20; player.ammo.shield += 20; } },
                { text: '쉴드 장전 시간 감소 (-20%)', action: () => { weapons.shield.reloadTime = Math.max(200, weapons.shield.reloadTime * 0.8); } }
            ];

            // 2000m (milestone 2) 이상 & 1회성 스킬 미습득 시 등장
            if (player.upgradeMilestone >= 2 && !player.hasDashPush) {
                options.push({ text: '돌격 (쉴드+대쉬 시 적을 밀어냄)', action: () => { player.hasDashPush = true; } });
            }
            // 3000m (milestone 3) 이상 & 1회성 스킬 미습득 시 등장
            if (player.upgradeMilestone >= 3 && !player.hasShieldRangeUp) {
                options.push({ text: '쉴드 범위 확장 (방어막 높이 증가)', action: () => { player.hasShieldRangeUp = true; } });
            }
            // 5000m (milestone 5) 이상 & 1회성 스킬 미습득 시 등장
            if (player.upgradeMilestone >= 5 && !player.hasAuraPower) {
                options.push({ text: '오라 파워 (후방 아군 공격력 +5)', action: () => { player.hasAuraPower = true; } });
            }

        } else {
            // [기본 특성] (아직 평민 상태)
            options = [
                { text: '최대 방어 갯수 +10', action: () => { weapons.shield.maxAmmo += 10; player.ammo.shield += 10; } }
            ];

            // 1000m (첫 번째 강화, milestone === 1) 일 때만 전직 등장
            if (player.upgradeMilestone === 1) {
                options.push({
                    text: '★ [전직] 디펜더 (모든 무기 공격력 50% 감소)',
                    action: () => {
                        player.job = 'defender'; // 디펜더로 전직 완료!
                        
                        // 모든 무기의 공격력을 반올림해서 반토막 냅니다.
                        for (let w in weapons) {
                            if (weapons[w].damage > 0) {
                                weapons[w].damage = Math.ceil(weapons[w].damage / 2);
                            }
                        }
                    }
                });
            }
        }
    } else if (categoryId === 'health') {
        options = [
            { text: '최대 체력 +200 증가', action: () => { player.maxHp += 200; player.hp += 200; } },
            { text: '체력 500 즉시 회복', action: () => player.hp = Math.min(player.maxHp, player.hp + 500) }
        ];
    } else if (categoryId === 'physical') {
        options = [
            { text: '이동속도 증가 (+1)', action: () => player.speed += 1 },
            { text: '숙이기(방어) 스태미너 증가 (+100)', action: () => player.maxCrouchStamina += 100 },
            { text: '모든 무기 장전 속도 20% 감소', action: () => {
                for (let w in weapons) {
                    weapons[w].reloadTime = Math.max(500, weapons[w].reloadTime * 0.8);
                }
            }}
        ];
    }

    // 선택지 버튼 생성
    options.forEach(opt => {
        const btn = document.createElement('button');
        btn.innerText = opt.text;
        btn.style.padding = '15px 40px';
        btn.style.fontSize = '22px';
        btn.style.cursor = 'pointer';
        btn.style.border = '2px solid #555';
        btn.style.borderRadius = '8px';
        btn.style.backgroundColor = '#222';
        btn.style.color = 'white';
        btn.style.transition = '0.2s';
        btn.onmouseover = () => { btn.style.backgroundColor = '#d4af37'; btn.style.color = 'black'; };
        btn.onmouseout = () => { btn.style.backgroundColor = '#222'; btn.style.color = 'white'; };
        
        btn.onclick = () => {
            opt.action(); // 선택한 강화 적용
            document.getElementById('upgradeUI').style.display = 'none';
            player.isUpgrading = false; // 게임 재개
            player.upgradeMilestone++;  // 다음 1000m를 위해 목표치 갱신 (1 -> 2 -> 3)
        };
        optionsDiv.appendChild(btn);
    });
}

// --- 시드 기반 난수 생성기 (지형 동기화) ---
let terrainSeed = 1;
function seededRandom() {
    let x = Math.sin(terrainSeed++) * 10000;
    return x - Math.floor(x);
}

const CHUNK_WIDTH = 800; 
let terrainChunks = [];
let lastPoint = { x: 0, y: 500 }; 

function initTerrain() {
    terrainChunks = [];
    lastPoint = { x: 0, y: 500 }; 
    terrainChunks.push([ { x: 0, y: 500 }, { x: CHUNK_WIDTH, y: 500 } ]);
    lastPoint = { x: CHUNK_WIDTH, y: 500 };
}

function lerpY(x, p1, p2) {
    return p1.y + (x - p1.x) / (p2.x - p1.x) * (p2.y - p1.y);
}

function generateTerrain() {
    while (lastPoint.x < camX + canvas.width * 2) {
        let startX = lastPoint.x;
        let endX = startX + CHUNK_WIDTH;
        
        let macroPoints = [];
        const type = Math.floor(seededRandom() * 3); 
        const getNextY = (prevY) => Math.max(300, Math.min(650, prevY + (seededRandom() * 120) - 60));

        if (type === 0) { 
            macroPoints.push({ x: endX, y: getNextY(lastPoint.y) });
        } else if (type === 1) { 
            let midX = startX + CHUNK_WIDTH * (seededRandom() * 0.4 + 0.3);
            let midY = getNextY(lastPoint.y);
            macroPoints.push({ x: midX, y: midY });
            macroPoints.push({ x: endX, y: getNextY(midY) });
        } else { 
            let mid1X = startX + CHUNK_WIDTH * 0.33;
            let mid2X = startX + CHUNK_WIDTH * 0.66;
            let mid1Y = getNextY(lastPoint.y);
            let mid2Y = getNextY(mid1Y);
            macroPoints.push({ x: mid1X, y: mid1Y });
            macroPoints.push({ x: mid2X, y: mid2Y });
            macroPoints.push({ x: endX, y: getNextY(mid2Y) });
        }

        let chunk = [{ x: startX, y: lastPoint.y }]; 
        
        for (let i = 0; i < macroPoints.length; i++) {
            let p1 = chunk[chunk.length - 1]; 
            let p2 = macroPoints[i];          
            let segmentWidth = p2.x - p1.x;

            if (segmentWidth > 300 && seededRandom() < 0.35) {
                let subType = seededRandom() < 0.5 ? 'mountain' : 'hill';
                let subWidth, peakHeight;

                if (subType === 'mountain') {
                    subWidth = Math.min(seededRandom() * 200 + 150, segmentWidth * 0.85);
                    peakHeight = seededRandom() * 120 + 100; 
                } else {
                    subWidth = Math.min(seededRandom() * 400 + 300, segmentWidth * 0.95);
                    peakHeight = seededRandom() * 60 + 50; 
                }
                
                let subStartX = p1.x + (segmentWidth - subWidth) * seededRandom(); 
                let subEndX = subStartX + subWidth;
                
                let subStartY = lerpY(subStartX, p1, p2);
                let subEndY = lerpY(subEndX, p1, p2);

                if (subType === 'mountain') {
                    let midX = (subStartX + subEndX) / 2;
                    let midY = lerpY(midX, p1, p2) - peakHeight; 
                    
                    chunk.push({ x: subStartX, y: subStartY }); 
                    chunk.push({ x: midX, y: midY });           
                    chunk.push({ x: subEndX, y: subEndY });     
                } else {
                    let mid1X = subStartX + subWidth * 0.2; 
                    let mid2X = subStartX + subWidth * 0.8; 
                    let mid1Y = lerpY(mid1X, p1, p2) - peakHeight;
                    let mid2Y = lerpY(mid2X, p1, p2) - peakHeight;
                    
                    chunk.push({ x: subStartX, y: subStartY }); 
                    chunk.push({ x: mid1X, y: mid1Y });         
                    chunk.push({ x: mid2X, y: mid2Y });         
                    chunk.push({ x: subEndX, y: subEndY });     
                }
            }
            chunk.push(p2);
        }
        terrainChunks.push(chunk);
        lastPoint = chunk[chunk.length - 1]; 
    }

    if (terrainChunks.length > 0 && terrainChunks[0][terrainChunks[0].length - 1].x < camX - 1000) {
        terrainChunks.shift();
    }
}

function getTerrainY(x) {
    for (let chunk of terrainChunks) {
        if (x >= chunk[0].x && x <= chunk[chunk.length - 1].x) {
            for (let i = 0; i < chunk.length - 1; i++) {
                let p1 = chunk[i];
                let p2 = chunk[i+1];
                if (x >= p1.x && x <= p2.x) {
                    let ratio = (x - p1.x) / (p2.x - p1.x);
                    return p1.y + ratio * (p2.y - p1.y);
                }
            }
        }
    }
    return 2000; 
}

// --- 사격 및 투사체 ---
function tryShoot() {
    // [수정] 강화 중에는 총이 발사되지 않음
    if (player.isUpgrading || player.isReloading || player.ammo[player.weapon] <= 0 || player.weapon === 'shield') return;

    const now = Date.now();
    const wData = weapons[player.weapon];

    if (now - player.lastShot >= wData.fireRate) {
        player.lastShot = now;
        player.shootTimer = 100; 
        player.ammo[player.weapon]--;
        
        let shootY = player.isCrouching ? player.y - 23 : player.y - 38;
        const targetX = mouse.x + camX;
        const targetY = mouse.y;

        if (player.weapon === 'machineGun' && !player.isCrouching) {
            player.recoil = Math.min((player.recoil || 0) + 0.015, 0.4); 
        }

        let angle = Math.atan2(targetY - shootY, targetX - player.x) - (player.recoil || 0); 

        if (player.weapon === 'shotgun') {
            for (let i = 0; i < wData.pellets; i++) {
                const spreadAngle = angle + (Math.random() - 0.5) * (wData.spread * Math.PI / 180);
                spawnBullet(spreadAngle, wData, shootY);
            }
        } else if (player.weapon === 'machineGun') {
            const rand1 = Math.random(); const rand2 = Math.random(); const rand3 = Math.random();
            const gaussianRandom = (rand1 + rand2 + rand3) / 3; 
            const normalized = (gaussianRandom - 0.5) * 2; 
            // [수정] 무기 데이터(wData.spread)에서 오차 범위를 가져와 강화를 통해 줄어들 수 있게 함
            const mgSpread = normalized * ((wData.spread || 5) * Math.PI / 180); 
            
            spawnBullet(angle + mgSpread, wData, shootY);
        } else {
            spawnBullet(angle, wData, shootY);
        }
    }
}

function spawnBullet(angle, wData, shootY) {
    const newBullet = {
        x: player.x, 
        y: shootY, 
        vx: Math.cos(angle) * wData.speed,
        vy: Math.sin(angle) * wData.speed,
        damage: wData.damage,
        color: wData.color,
        distanceTraveled: 0,
        weaponType: player.weapon,
        pierceRemaining: wData.pierce || 0,
        hitEnemies: [], // [추가] 관통 시 동일한 적 중복 타격 방지 배열
        isEnemy: false
    };
    bullets.push(newBullet);

    if (isGameStarted) {
        socket.emit('shootBullet', newBullet);
    }
}

// --- 게임 엔진 로직 ---
let lastEnemySpawn = Date.now();

let lastEmitTime = 0;               
const TICK_RATE = 15;               
const TICK_INTERVAL = 1000 / TICK_RATE; 

function gameLoop() {
    update();
    draw();
    if (isGameStarted) {
        requestAnimationFrame(gameLoop);
    }
}

// --- 메인 루프 (update) ---
function update() {
    // 강화 창이 켜져 있으면 게임의 물리 연산, 적 이동, 투사체 등 모든 로직을 일시정지
    if (player.isUpgrading) return; 

    generateTerrain();

    if (player.recoil > 0) {
        if (!mouse.isDown || player.weapon !== 'machineGun' || player.isCrouching) {
            player.recoil = player.isCrouching ? 0 : Math.max(0, player.recoil - 0.02);
        }
    }

    let shootY = player.isCrouching ? player.y - 23 : player.y - 38;
    player.aimAngle = Math.atan2(mouse.y - shootY, (mouse.x + camX) - player.x);

    if (isGameStarted) {
        const now = Date.now();
        if (now - lastEmitTime > TICK_INTERVAL) {
            socket.emit('playerUpdate', {
                x: player.x, y: player.y, weapon: player.weapon, hp: player.hp, maxHp: player.maxHp,
                isCrouching: player.isCrouching, aimAngle: player.aimAngle,
                isReloading: player.isReloading, vx: player.vx, name: globalPlayerName,
                shieldAmmo: player.ammo['shield'], isSlowWalking: player.isSlowWalking
            });
            lastEmitTime = now;
        }
    }

    for (let i = barricades.length - 1; i >= 0; i--) {
        let bar = barricades[i];
        if (bar.y < bar.targetY) {
            bar.y += 30; 
            if (bar.y > bar.targetY) bar.y = bar.targetY;
        }
        if (bar.hp <= 0) {
            for (let k = 0; k < 15; k++) sparks.push({ x: bar.x, y: bar.y - 30, vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 10, life: 15 + Math.random() * 15 });
            barricades.splice(i, 1);
        }
    }

    for (let i = items.length - 1; i >= 0; i--) {
        let item = items[i];
        item.vy += player.gravity; 
        item.x += item.vx; item.y += item.vy;

        const itemGroundY = getTerrainY(item.x);
        if (item.y >= itemGroundY) {
            item.y = itemGroundY; item.vy = 0; item.vx *= 0.8; 
        }

        if (Math.abs(player.x - item.x) < (player.width / 2 + item.width / 2 + 10) && Math.abs((player.y - 25) - (item.y - 10)) < (25 + 10 + 10)) {
            const wData = weapons[player.weapon];
            if (player.weapon === 'pistol') player.ammo['pistol'] = wData.maxAmmo; 
            else if (player.weapon === 'machineGun') player.ammo['machineGun'] = Math.min(wData.maxAmmo, player.ammo['machineGun'] + 25);
            else if (player.weapon === 'shotgun') player.ammo['shotgun'] = Math.min(wData.maxAmmo, player.ammo['shotgun'] + 3);
            else if (player.weapon === 'sniper') player.ammo['sniper'] = Math.min(wData.maxAmmo, player.ammo['sniper'] + 1);

            for (let k = 0; k < 10; k++) sparks.push({ type: 'normal', x: item.x, y: item.y - 10, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8, life: 15 + Math.random() * 10, color: "yellow" });
            items.splice(i, 1); 
        }
    }

    // 이펙트 파티클 물리 연산
    for (let i = sparks.length - 1; i >= 0; i--) {
        let s = sparks[i]; 
        if (s.type === 'shockwave') {
            s.radius += 3; 
            s.life -= 1;
            if (s.life <= 0) sparks.splice(i, 1);
        } else {
            s.x += s.vx; s.y += s.vy; s.life -= 1;
            if (s.life <= 0) sparks.splice(i, 1);
        }
    }

    if (keys['s']) {
        if (player.crouchStamina > 0) {
            player.isCrouching = true; player.crouchStamina -= 1; 
        } else { player.isCrouching = false; }
    } else {
        player.isCrouching = false;
        if (player.crouchStamina < player.maxCrouchStamina) {
            player.crouchStamina += 0.75; 
            if (player.crouchStamina > player.maxCrouchStamina) player.crouchStamina = player.maxCrouchStamina;
        }
    }

    if (player.isReloading) {
        const wData = weapons[player.weapon];
        const elapsed = Date.now() - player.reloadStart;
        player.reloadProgress = Math.min(1, elapsed / wData.reloadTime);
        if (player.reloadProgress >= 1) {
            player.money -= wData.reloadCost; 
            player.ammo[player.weapon] = wData.maxAmmo; 
            player.isReloading = false;
        }
    }

    let currentSpeed = player.speed;
    if (player.isSlowWalking) currentSpeed *= 0.3; 
    if (player.isCrouching) currentSpeed *= 0.2; 
    if (player.isReloading) currentSpeed *= 0.6;
    else if (player.weapon === 'shield' && player.ammo['shield'] > 0) currentSpeed *= 0.7; 
    
    if (player.dashTimer > 0) {
        player.vx = player.dashDirection * 22; player.dashTimer--; player.isCrouching = false; 
    } else {
        if (keys['a']) player.vx = -currentSpeed; else if (keys['d']) player.vx = currentSpeed; else player.vx = 0;
    }

    if (keys['w'] && player.isGrounded && !player.isCrouching) {
        player.vy = player.jumpPower; player.isGrounded = false;
    }

    if (mouse.isDown && player.weapon === 'machineGun') tryShoot();

    player.vy += player.gravity; player.x += player.vx; player.y += player.vy;

    // 디펜더 특수 스킬: '돌격 (쉴드 배쉬)' 물리 충돌 로직
    if (player.job === 'defender' && player.hasDashPush && player.weapon === 'shield' && player.dashTimer > 0) {
        let pushRange = 50; 
        
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            
            if (e.hp <= 0 || e.enemyType === 4 || e.enemyType === 5) continue; 
            if (e.lastHitDashTime === player.lastDashTime) continue; 

            let dx = e.x - player.x;
            let dy = e.y - player.y;
            let dist = Math.sqrt(dx*dx + dy*dy);

            if (dist < pushRange + (e.width/2) && Math.sign(dx) === player.dashDirection) {
                
                e.lastHitDashTime = player.lastDashTime;
                e.stunTimer = 20; 
                e.vx = player.dashDirection * 15; 
                e.vy = -7; 
                e.isGrounded = false;
                
                let dashDamage = 30; 
                e.hp -= dashDamage;
                socket.emit('enemyHit', { enemyId: e.id, damage: dashDamage });

                sparks.push({ type: 'shockwave', x: e.x, y: e.y - 20, radius: 1, life: 15, color: 'cyan' });
                for(let k=0; k<10; k++) {
                    sparks.push({ 
                        type: 'normal', x: e.x, y: e.y - 20, 
                        vx: player.dashDirection * (Math.random() * 10 + 5), 
                        vy: (Math.random() - 0.5) * 10 - 5, 
                        life: 10 + Math.random() * 10, color: 'white' 
                    });
                }
            }
        }
    }

    if (terrainChunks.length > 0) {
        let leftBoundary = terrainChunks[0][0].x + (player.width / 2); 
        if (player.x < leftBoundary) {
            player.x = leftBoundary;
            if (player.vx < 0) player.vx = 0; 
        }
    }

    let activeBoss = enemies.find(e => e.enemyType === 4);
    if (activeBoss) {
        if (!player.arenaRightWall) player.arenaRightWall = activeBoss.x + 200; 
        if (player.x > player.arenaRightWall) {
            player.x = player.arenaRightWall;
            if (player.vx > 0) player.vx = 0;
        }
    } else {
        player.arenaRightWall = null;
    }

    const groundY = getTerrainY(player.x);
    if (player.y >= groundY) { player.y = groundY; player.vy = 0; player.isGrounded = true; } else { player.isGrounded = false; }

    if (player.isGrounded && Math.abs(player.vx) > 0.1 && !player.isCrouching) player.walkTime += (player.vx > 0 ? 0.2 : -0.2); 
    else if (player.isGrounded) player.walkTime = 0; 
    
    if (player.shootTimer > 0) player.shootTimer -= 16;

    camX = player.x - canvas.width / 4; 
    if (player.x > maxDistance) {
        maxDistance = player.x;
        document.getElementById('distanceUI').innerText = Math.floor(maxDistance / 50);
    }

    let currentMeters = Math.floor(maxDistance / 50);

    if (currentMeters >= player.upgradeMilestone * 1000) {
        showUpgradeMenu();
        return; 
    }
    
    document.getElementById('ammoUI').innerText = `[${player.ammo[player.weapon]} / ${weapons[player.weapon].maxAmmo}]`;
    document.getElementById('moneyUI').innerText = player.money;
    document.getElementById('hpUI').innerText = `${Math.max(0, player.hp)} / ${player.maxHp}`; 

    if (isHost && currentMeters >= player.nextBossMilestone) {
        let bossLevel = Math.floor((player.nextBossMilestone - 500) / 1000); 
        let bossMaxHp = BOSS_CONFIG.baseHp + (BOSS_CONFIG.hpPerLevel * (bossLevel - 1));
        
        let bossEnemy = {
            id: 'BOSS_' + Math.random().toString(36).substr(2, 9), x: player.x + canvas.width + 150, 
            y: 100, vx: 0, vy: 0, width: 60, height: 150, 
            hp: bossMaxHp, maxHp: bossMaxHp, color: '#8b0000', enemyType: 4,     
            walkTime: 0, shootTimer: 0, attackTimer: 0, reward: 1000 * bossLevel, weapon: 'machineGun', isGrounded: false 
        };
        socket.emit('spawnEnemy', bossEnemy);
        player.nextBossMilestone += 1000;
    }

    let spawnCooldown = 5000; let specialChance = 0.05; let enemyLevel = 1;
    if (currentMeters < 1000) { spawnCooldown = 5000; specialChance = 0.01; enemyLevel = 1; } 
    else if (currentMeters < 2000) { spawnCooldown = 3000; specialChance = 0.05; enemyLevel = 3; } 
    else if (currentMeters < 3000) { spawnCooldown = 1000; specialChance = 0.10; enemyLevel = 5; } 
    else { spawnCooldown = 500; specialChance = 0.20; enemyLevel = 8; }

    if (isHost && Date.now() - lastEnemySpawn > spawnCooldown) {
        // 🚨 [수정] 룰렛 방식을 탈피하고 여러 종류의 적이 동시에 나올 수 있는 스폰 큐(대기열) 추가
        let spawnQueue = [];

        if (Math.random() < specialChance) {
            let r = Math.random();
            if (r < 0.25) spawnQueue.push({ type: 1, count: 1 }); 
            else if (r < 0.50) spawnQueue.push({ type: 2, count: 1 }); 
            else if (r < 0.75) spawnQueue.push({ type: 3, count: 1 }); 
            else spawnQueue.push({ type: 5, count: 1 }); 
        } else {
            // 일반 적 스폰 로직: 권총만 / 근접만 / 섞어서 등장
            let r = Math.random();
            if (r < 0.33) {
                spawnQueue.push({ type: 0, count: 1 }); // 권총 스틱맨 1마리
            } else if (r < 0.66) {
                spawnQueue.push({ type: 6, count: 2 }); // 근접 보병 2마리
            } else {
                spawnQueue.push({ type: 0, count: 1 }); // 권총 1마리
                spawnQueue.push({ type: 6, count: 2 }); // 근접 2마리 (동시 스폰!)
            }
        }

        let spawnOffsetX = 0; // 한 번에 여러 마리가 나올 때 서로 겹치지 않게 간격을 줌

        for (let sq of spawnQueue) {
            let enemyType = sq.type;
            let spawnCount = sq.count;

            let isSpecial = (enemyType > 0 && enemyType !== 6);
            let eWidth = enemyType === 3 ? 14 : (enemyType === 5 ? 24 : 20); 
            let eHeight = enemyType === 3 ? 35 : (enemyType === 5 ? 16 : 50);  
            let eColor = '#00aa00';
            if (enemyType === 1) eColor = 'purple'; 
            else if (enemyType === 2) eColor = 'orange'; 
            else if (enemyType === 3) eColor = 'red'; 
            else if (enemyType === 5) eColor = 'red'; 
            else if (enemyType === 6) eColor = 'gray'; 
            
            let baseEnemyHp = isSpecial ? 60 + (enemyLevel * 10) : 25 + (enemyLevel * 3);
            let finalHp = enemyType === 3 ? 20 : (enemyType === 5 ? 30 + (enemyLevel * 5) : baseEnemyHp);

            for (let s = 0; s < spawnCount; s++) {
                let newEnemy = {
                    id: Math.random().toString(36).substr(2, 9), 
                    x: player.x + canvas.width + 100 + spawnOffsetX, 
                    y: enemyType === 5 ? player.y - 100 : 100, 
                    vx: 0, vy: 0, width: eWidth, height: eHeight, hp: finalHp, maxHp: finalHp,
                    color: eColor, enemyType: enemyType, walkTime: Math.random() * Math.PI, shootTimer: 0, attackTimer: 0, 
                    reward: enemyType === 3 ? 40 : (enemyType === 5 ? 60 : (isSpecial ? 50 : 20)),
                    weapon: enemyType === 3 ? 'none' : ((enemyType === 2 || enemyType === 6) ? 'melee' : (enemyType === 5 ? 'droneGun' : 'pistol')), 
                    isGrounded: false, burstCount: 0, burstTimer: 0 
                };
                socket.emit('spawnEnemy', newEnemy);
                spawnOffsetX += 45; // 다음 적은 45픽셀 뒤쪽에 스폰
            }
        }
        lastEnemySpawn = Date.now();
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        if (e.hp <= 0) {
            player.money += e.reward; 
            if (e.enemyType === 4) {
                for(let m = 0; m < 3; m++) items.push({ x: e.x + (Math.random()*40-20), y: e.y - 10, vx: (Math.random() - 0.5) * 10, vy: -5 - Math.random()*3, width: 14, height: 20 });
            } else if (e.enemyType === 5) {
                for (let k = 0; k < 25; k++) sparks.push({ x: e.x, y: e.y, vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15, life: 15 + Math.random() * 20, color: 'orange' });
                for (let k = 0; k < 15; k++) sparks.push({ x: e.x, y: e.y, vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20, life: 10 + Math.random() * 10, color: 'red' });
                if (Math.random() < 0.15) items.push({ x: e.x, y: e.y, vx: (Math.random() - 0.5) * 6, vy: -4, width: 14, height: 20 });
            } else if (Math.random() < 0.10) {
                items.push({ x: e.x, y: e.y - 10, vx: (Math.random() - 0.5) * 6, vy: -4, width: 14, height: 20 });
            }
            enemies.splice(i, 1);
            continue;
        }
        
        if (e.enemyType !== 5) e.vy += player.gravity;

        let target = player; let minDist = Math.abs(e.x - player.x);
        for (let id in otherPlayers) {
            let op = otherPlayers[id]; let absD = Math.abs(e.x - op.x);
            if (absD < minDist) { minDist = absD; target = op; }
        }
        let dist = e.x - target.x; let absDist = Math.abs(dist); let dir = dist > 0 ? -1 : 1; 
        let baseSpeed = e.maxHp >= 60 ? 2 : 1.25; 
        
        e.stunTimer = e.stunTimer || 0;
        if (e.stunTimer > 0) {
            e.stunTimer--;
        } else {
            if (e.enemyType === 5) {
                baseSpeed = 3.0;
                let targetAltitude = target.y - 80;
                e.y += (targetAltitude - e.y) * 0.05; 
                if (absDist > 150) e.vx = baseSpeed * dir; else e.vx = 0; 

                if (absDist <= 450 && Date.now() - (e.lastShot || 0) > 1000) {
                    e.lastShot = Date.now(); e.burstCount = 3; e.burstTimer = 0;
                }
                if (e.burstCount > 0 && e.burstTimer <= 0) {
                    const targetHeadY = target.y - 25; 
                    const angle = Math.atan2(targetHeadY - e.y, target.x - e.x);
                    bullets.push({ 
                        x: e.x, y: e.y + 4, vx: Math.cos(angle) * 14, vy: Math.sin(angle) * 14, 
                        damage: 4, color: 'yellow', distanceTraveled: 0, weaponType: 'machineGun', pierceRemaining: 0, isEnemy: true 
                    });
                    e.burstCount--; e.burstTimer = 5;
                }
                if (e.burstTimer > 0) e.burstTimer--;
            }
            else if (e.enemyType === 4) {
                baseSpeed = BOSS_CONFIG.moveSpeed; 
                if (absDist > 650) e.vx = baseSpeed * dir; else if (absDist < 450) e.vx = (baseSpeed * 0.5) * (-dir); else e.vx = 0; 
                if (absDist <= 850 && Date.now() - (e.lastShot || 0) > BOSS_CONFIG.fireRate) { 
                    e.lastShot = Date.now(); e.shootTimer = 100; 
                    const targetHeadY = target.y - 25; const angle = Math.atan2(targetHeadY - (e.y - 114), target.x - e.x);
                    const bossSpread = (Math.random() - 0.5) * (12 * Math.PI / 180);
                    bullets.push({ x: e.x, y: e.y - 114, vx: Math.cos(angle + bossSpread) * BOSS_CONFIG.bulletSpeed, vy: Math.sin(angle + bossSpread) * BOSS_CONFIG.bulletSpeed, damage: BOSS_CONFIG.damage, color: 'red', distanceTraveled: 0, weaponType: 'machineGun', pierceRemaining: 0, isEnemy: true });
                }
            }
            else if (e.enemyType === 6) {
                baseSpeed = 0.85; 
                if (absDist > 30) e.vx = baseSpeed * dir; else e.vx = 0;
                if (absDist <= 40 && Date.now() - (e.lastShot || 0) > 1200) {
                    e.lastShot = Date.now(); e.attackTimer = 15;
                    if (target === player) {
                        if (player.weapon === 'shield' && player.ammo['shield'] > 0) {
                            player.ammo['shield']--;
                            for (let k = 0; k < 10; k++) sparks.push({ x: player.x, y: player.y - 25, vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10, life: 15 + Math.random() * 10 });
                        } else { 
                            player.hp -= 10; 
                            if (player.hp <= 0) { alert("게임 오버!"); location.reload(); } 
                        }
                    }
                }
            }
            else if (e.enemyType === 3) {
                baseSpeed = 4.0; 
                if (absDist > 10) e.vx = baseSpeed * dir; else e.vx = 0;
                if (e.isGrounded && Math.random() < 0.05) { e.vy = player.jumpPower * 0.85; e.isGrounded = false; }
                if (absDist <= 30 && Math.abs(e.y - target.y) < 50) {
                    for (let k = 0; k < 30; k++) sparks.push({ x: e.x, y: e.y - 15, vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20, life: 20 + Math.random() * 20 });
                    if (target === player) {
                        if (player.weapon === 'shield' && player.ammo['shield'] > 0) player.ammo['shield'] = 0; 
                        else { player.hp -= 80; if (player.hp <= 0) { alert("게임 오버!"); location.reload(); } }
                    }
                    e.hp = 0; 
                }
            } 
            else if (e.enemyType === 2) {
                baseSpeed *= 1.6; 
                if (absDist > 40) e.vx = baseSpeed * dir; else e.vx = 0; 
                if (absDist <= 40 && Date.now() - (e.lastShot || 0) > 1000) {
                    e.lastShot = Date.now(); e.attackTimer = 15; 
                    if (target === player) {
                        if (player.weapon === 'shield' && player.ammo['shield'] > 0) {
                            player.ammo['shield']--;
                            for (let k = 0; k < 10; k++) sparks.push({ x: player.x, y: player.y - 25, vx: (Math.random() - 0.5) * 10, vy: (Math.random() - 0.5) * 10, life: 15 + Math.random() * 10 });
                        } else { player.hp -= 20; if (player.hp <= 0) { alert("게임 오버!"); location.reload(); } }
                    }
                }
            } else {
                if (absDist > 600) e.vx = baseSpeed * dir; else if (absDist < 450) e.vx = (baseSpeed * 0.8) * (-dir); else e.vx = 0; 
                if (absDist <= 600 && Date.now() - (e.lastShot || 0) > 2000) { 
                    e.lastShot = Date.now(); e.shootTimer = 100; 
                    const targetHeadY = target.y - 45; const angle = Math.atan2(targetHeadY - (e.y - 38), target.x - e.x);
                    bullets.push({ x: e.x, y: e.y - 38, vx: Math.cos(angle) * 12, vy: Math.sin(angle) * 12, damage: 5, color: 'orange', distanceTraveled: 0, weaponType: 'pistol', pierceRemaining: 0, isEnemy: true });
                }
            }
        } 
        
        e.x += e.vx; e.y += e.vy;
        if (e.vx !== 0) e.walkTime += (e.vx > 0 ? 0.2 : -0.2); 
        if (e.shootTimer > 0) e.shootTimer -= 16; if (e.attackTimer > 0) e.attackTimer -= 1; 
        
        if (e.enemyType !== 5) {
            const eGroundY = getTerrainY(e.x);
            if (e.y >= eGroundY) { e.y = eGroundY; e.vy = 0; e.isGrounded = true; } else { e.isGrounded = false; }
        }
        if (e.x < camX - 2000 || e.y > 2000) enemies.splice(i, 1);
    }

    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx; b.y += b.vy; b.distanceTraveled += Math.sqrt(b.vx*b.vx + b.vy*b.vy);
        let destroy = false;
        
        if (b.isEnemy) {
            let hitSomeone = false;
            let pHeight = player.isCrouching ? 35 : player.height;
            let bRadius = b.weaponType === 'sniper' ? 5 : 3;
            let hitBarricade = false;
            for (let k = 0; k < barricades.length; k++) {
                let bar = barricades[k];
                if (b.x + bRadius > bar.x - bar.width/2 && b.x - bRadius < bar.x + bar.width/2 && b.y + bRadius > bar.y - bar.height && b.y - bRadius < bar.y) {
                    bar.hp -= b.damage; hitBarricade = true; destroy = true; 
                    for (let s = 0; s < 5; s++) sparks.push({ x: b.x, y: b.y, vx: -b.vx * 0.4 + (Math.random() - 0.5) * 8, vy: -b.vy * 0.4 + (Math.random() - 0.5) * 8, life: 10 + Math.random() * 10 });
                    break;
                }
            }
            if (!hitBarricade) {
                if (b.x + bRadius > player.x - player.width/2 && b.x - bRadius < player.x + player.width/2 && b.y + bRadius > player.y - pHeight && b.y - bRadius < player.y) {
                    hitSomeone = true;
                    if (player.weapon === 'shield' && player.ammo['shield'] > 0) {
                        player.ammo['shield']--; destroy = true;          
                        for (let k = 0; k < 6; k++) sparks.push({ x: b.x, y: b.y, vx: -b.vx * 0.4 + (Math.random() - 0.5) * 8, vy: -b.vy * 0.4 + (Math.random() - 0.5) * 8, life: 10 + Math.random() * 10 });
                    } else {
                        player.hp -= b.damage; destroy = true;
                        if (player.hp <= 0) { alert("게임 오버!"); location.reload(); }
                    }
                }
                if (!hitSomeone) {
                    for (let id in otherPlayers) {
                        let op = otherPlayers[id];
                        let opHeight = op.isCrouching ? 35 : 50; 
                        if (b.x + bRadius > op.x - 10 && b.x - bRadius < op.x + 10 && b.y + bRadius > op.y - opHeight && b.y - bRadius < op.y) {
                            destroy = true;
                            if (op.weapon === 'shield' && op.shieldAmmo > 0) {
                                for (let k = 0; k < 6; k++) sparks.push({ x: b.x, y: b.y, vx: -b.vx * 0.4 + (Math.random() - 0.5) * 8, vy: -b.vy * 0.4 + (Math.random() - 0.5) * 8, life: 10 + Math.random() * 10 });
                            }
                            break;
                        }
                    }
                }
            }
        } else {
            for (let j = enemies.length - 1; j >= 0; j--) {
                let e = enemies[j];
                if (e.hp <= 0) continue; 
                if (b.weaponType === 'sniper' && b.distanceTraveled < weapons.sniper.minRange) continue;
                let hitWidth = e.width + 14;  
                let hitHeight = e.height + 15; 

                if (b.x > e.x - hitWidth/2 && b.x < e.x + hitWidth/2 && b.y > e.y - hitHeight && b.y < e.y) {
                    if (b.hitEnemies && b.hitEnemies.includes(e.id)) continue; 
                    let finalDamage = b.damage;
                    if (b.weaponType === 'shotgun') {
                        let distanceMultiplier = Math.max(1, 3 - (b.distanceTraveled / 150));
                        finalDamage = b.damage * distanceMultiplier;
                    }
                    e.hp -= finalDamage; 
                    socket.emit('enemyHit', { enemyId: e.id, damage: finalDamage }); 
                    if (b.hitEnemies) b.hitEnemies.push(e.id); 
                    if (b.pierceRemaining > 0) { b.pierceRemaining--; } else { destroy = true; }
                    if (destroy) break; 
                }
            }
        }
        if (!destroy) {
            let ty = getTerrainY(b.x);
            if (b.y > ty) {
                if (b.pierceRemaining > 0) { b.pierceRemaining--; b.damage *= 0.7; } 
                else { destroy = true; }
            }
        }
        let maxRange = (b.weaponType === 'shotgun') ? 400 : 2000;
        if (b.distanceTraveled > maxRange || b.x > camX + canvas.width * 1.5) destroy = true;
        if (destroy) bullets.splice(i, 1);
    }
}

// --- 캔버스 총기 및 방패 고해상도 드로잉 함수 ---
function drawWeapon(ctx, x, y, angle, type, entity) { // [수정] 매개변수 entity 추가
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    
    if (Math.abs(angle) > Math.PI / 2) {
        ctx.scale(1, -1);
    }
    
    if (type === 'pistol') {
        ctx.fillStyle = "#333"; 
        ctx.fillRect(-4, -5, 18, 4.5);
        ctx.fillStyle = "#1a1a1a"; 
        ctx.fillRect(14, -4.5, 2, 3.5);
        ctx.fillStyle = "#1a1a1a"; 
        ctx.fillRect(-4, -0.5, 16, 3);
        ctx.save(); 
        ctx.rotate(15 * Math.PI / 180);
        ctx.fillRect(-4, 0, 5.5, 10);
        ctx.restore();
        ctx.strokeStyle = "#1a1a1a"; 
        ctx.lineWidth = 1.5;
        ctx.strokeRect(2, 2.5, 6, 3);
        ctx.fillStyle = "#1a1a1a"; 
        ctx.fillRect(-2, -6, 2, 1);
        ctx.fillRect(12, -6, 1, 1);

    } else if (type === 'machineGun') {
        ctx.fillStyle = "#333"; 
        ctx.fillRect(-18, -4, 12, 5);
        ctx.fillStyle = "#1a1a1a"; 
        ctx.fillRect(-6, -4, 3, 2.5);
        ctx.fillStyle = "#1a1a1a"; 
        ctx.fillRect(-3, -2, 10, 5);
        ctx.save(); 
        ctx.translate(3, 3);
        ctx.rotate(-5 * Math.PI / 180);
        ctx.fillStyle = "#222";
        ctx.fillRect(0, 0, 4, 10);
        ctx.restore();
        ctx.save(); 
        ctx.translate(-3, 2);
        ctx.rotate(20 * Math.PI / 180);
        ctx.fillStyle = "#222";
        ctx.fillRect(0, 0, 4, 9);
        ctx.restore();
        ctx.fillStyle = "#1a1a1a"; 
        ctx.fillRect(-4, -6, 14, 4);
        ctx.fillStyle = "#333"; 
        ctx.fillRect(10, -6, 22, 3.5);
        ctx.fillStyle = "#555"; 
        ctx.fillRect(32, -4.5, 12, 1.5);
        ctx.fillStyle = "#1a1a1a"; 
        ctx.fillRect(28, -7, 2, 3);
        ctx.fillStyle = "#555"; 
        ctx.fillRect(44, -5, 3, 2.5);
        ctx.fillStyle = "#1a1a1a"; 
        ctx.fillRect(-2, -8, 2, 2);

    } else if (type === 'shotgun') {
        ctx.fillStyle = "#6f4e37"; 
        ctx.beginPath();
        ctx.moveTo(-20, -2);
        ctx.lineTo(-4, -2);
        ctx.lineTo(-4, 2);
        ctx.lineTo(-12, 5);
        ctx.lineTo(-20, 5);
        ctx.fill();
        ctx.save(); 
        ctx.rotate(20 * Math.PI / 180);
        ctx.fillRect(-4, 0, 5, 8);
        ctx.restore();
        ctx.fillStyle = "#111"; 
        ctx.fillRect(-4, -5, 14, 6);
        ctx.fillStyle = "#555"; 
        ctx.fillRect(10, -4, 35, 2);
        ctx.fillStyle = "#333"; 
        ctx.fillRect(10, -1.5, 33, 1.5);
        ctx.fillStyle = "#6f4e37"; 
        ctx.fillRect(15, -2.5, 14, 3.5);
        ctx.fillStyle = "#111"; 
        ctx.fillRect(42, -5, 1.5, 1);

    } else if (type === 'sniper') {
        ctx.fillStyle = "#4d2a1a"; 
        ctx.beginPath();
        ctx.moveTo(-18, -1);
        ctx.lineTo(25, -1);
        ctx.lineTo(25, 2);
        ctx.lineTo(5, 3);
        ctx.lineTo(-3, 3);
        ctx.lineTo(-5, 6);
        ctx.lineTo(-8, 6);
        ctx.lineTo(-18, 3);
        ctx.fill();
        ctx.fillStyle = "#3d2115"; 
        ctx.fillRect(8, -3, 20, 2);
        ctx.fillStyle = "#151515"; 
        ctx.fillRect(28, -2.5, 15, 1.5);
        ctx.fillStyle = "#222222"; 
        ctx.fillRect(-3, -4, 11, 3);
        ctx.fillStyle = "#c0c0c0"; 
        ctx.fillRect(-3, -3, 10, 1);
        ctx.fillStyle = "#111"; 
        ctx.fillRect(1, -2, 1.5, 4);
        ctx.beginPath(); 
        ctx.arc(1.75, 2, 1.5, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = "rgb(53, 53, 53)"; 
        ctx.fillRect(-1, -7, 14, 2.5);
        ctx.fillStyle = "#222222"; 
        ctx.fillRect(12, -3.5, 1.5, 4);
        ctx.fillRect(24, -3.5, 1.5, 4);
        ctx.fillStyle = "#111"; 
        ctx.fillRect(41, -4, 1.5, 1.5);
        ctx.fillRect(5, -5, 3, 1); 

    } else if (type === 'melee') {
        ctx.fillStyle = "#ff0000"; 
        ctx.fillRect(0, -2, 28, 4); 
        ctx.fillStyle = "#555";
        ctx.fillRect(0, -3, 6, 6); 

    } else if (type === 'shield') {
        ctx.fillStyle = "#333"; 
        ctx.fillRect(-4, -4, 8, 8); 
        
        ctx.fillStyle = "rgba(0, 255, 255, 0.4)";
        ctx.strokeStyle = "cyan";
        ctx.lineWidth = 2;
        
        // 🚨 [추가] 쉴드 범위 확장 스킬 적용
        let sHeight = (entity && entity.hasShieldRangeUp) ? 45 : 25; 
        
        ctx.beginPath();
        ctx.moveTo(12, -sHeight);
        ctx.quadraticCurveTo(22, 0, 12, sHeight);
        ctx.lineTo(6, sHeight);
        ctx.quadraticCurveTo(16, 0, 6, -sHeight);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

    } else {
        ctx.fillStyle = "#333";
        ctx.fillRect(0, -2, 10, 4); 
        ctx.fillRect(0, 0, 4, 6);
    }
    ctx.restore();
}

/// --- 기호 기반 스틱맨 그리기 함수 ---
function drawStickman(ctx, entity, aimTarget, isPlayer, playerName = null) {
    let aimAngle = Math.atan2(aimTarget.y - (entity.y - 38), aimTarget.x - entity.x);
    let facing = (Math.cos(aimAngle) > 0) ? 1 : -1;
    
    // 🚨 [추가] 오라 파워 (황금색 배경 오라 렌더링)
    if (entity.job === 'defender' && entity.hasAuraPower) {
        ctx.save();
        ctx.fillStyle = "rgba(255, 215, 0, 0.15)";
        ctx.shadowColor = "gold";
        ctx.shadowBlur = 20;
        ctx.beginPath();
        ctx.arc(entity.x, entity.y - 25, 80, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    ctx.strokeStyle = isPlayer ? (playerName ? "blue" : "black") : entity.color; 
    ctx.lineWidth = 4;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    let t = entity.walkTime || 0;
    let walkOffset = (entity.isGrounded) ? Math.sin(t) * 8 : 0; 

    let isCrouching = entity.isCrouching;

    let pelvisX = entity.x;
    let pelvisY = entity.y - 24;
    let neckX = entity.x;
    let neckY = entity.y - 42;

    if (isCrouching) {
        pelvisY += 15;
        neckY += 15;
    }

    if (!['pistol', 'melee', 'shield'].includes(entity.weapon)) {
        if (!isCrouching) {
            pelvisX = entity.x - facing * 5;
            neckX = entity.x + facing * 5;
        }
    }

    let shoulderX = neckX - facing * 2;
    let shoulderY = neckY + 4;

    if (isCrouching) {
        ctx.beginPath();
        ctx.moveTo(pelvisX, pelvisY);
        ctx.lineTo(pelvisX, entity.y);
        ctx.lineTo(pelvisX - facing * 12, entity.y); 
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(pelvisX, pelvisY);
        ctx.lineTo(pelvisX + facing * 12, pelvisY); 
        ctx.lineTo(pelvisX + facing * 12, entity.y);
        ctx.stroke();
    } else {
        ctx.beginPath();
        ctx.moveTo(pelvisX, pelvisY);
        ctx.lineTo(pelvisX - facing * 10 + walkOffset, entity.y); 
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(pelvisX, pelvisY);
        ctx.quadraticCurveTo(pelvisX + facing * 12, pelvisY + 12, pelvisX + facing * 6 - walkOffset, entity.y);
        ctx.stroke();
    }

    ctx.beginPath();
    ctx.moveTo(pelvisX, pelvisY);
    ctx.lineTo(neckX, neckY);
    ctx.stroke();

    const headRadius = 7;
    ctx.beginPath();
    ctx.arc(neckX + facing * 2, neckY - headRadius, headRadius, 0, Math.PI * 2);
    ctx.fillStyle = ctx.strokeStyle;
    if (!isPlayer) { ctx.fill(); } else { ctx.stroke(); }

    let isAiming = isPlayer ? (entity.shootTimer > 0 || (playerName == null ? mouse.isDown : true)) : true;
    let finalAimAngle = aimAngle;

    if (isPlayer && entity.isReloading) {
        finalAimAngle = Math.PI / 2; 
    }

    if (entity.attackTimer && entity.attackTimer > 0) {
        finalAimAngle += facing * (Math.sin(entity.attackTimer * 0.4) * 1.5);
    }

    let recoilOffset = (isAiming && entity.shootTimer > 0 && !(isPlayer && entity.isReloading)) ? (Math.random() * 2) : 0;
    
    let handX = shoulderX + Math.cos(finalAimAngle) * (16 - recoilOffset);
    let handY = shoulderY + Math.sin(finalAimAngle) * (16 - recoilOffset);

    let elbowX = shoulderX + facing * 4;
    let elbowY = shoulderY + 12;

    if (['pistol', 'melee', 'shield'].includes(entity.weapon)) {
        elbowX = (shoulderX + handX) / 2;
        elbowY = (shoulderY + handY) / 2;
    }

    // 🚨 [수정] drawWeapon 호출 시 entity 넘겨주기
    drawWeapon(ctx, handX, handY, finalAimAngle, entity.weapon, entity);

    if (!['pistol', 'melee', 'shield'].includes(entity.weapon)) {
        let supportX = handX + Math.cos(finalAimAngle) * 14; 
        let supportY = handY + Math.sin(finalAimAngle) * 14;
        let elbow2X = shoulderX + facing * 10;
        let elbow2Y = shoulderY + 14;

        ctx.beginPath();
        ctx.moveTo(shoulderX, shoulderY);
        ctx.lineTo(elbow2X, elbow2Y);
        ctx.lineTo(supportX, supportY);
        ctx.stroke();
    } else {
        let swing = (Math.abs(entity.vx) > 0.1 && !isCrouching && !(isPlayer && entity.isReloading)) ? Math.sin(t + Math.PI) * 6 : 0;
        let leftHandX = shoulderX - facing * 8 + swing; 
        let leftHandY = shoulderY + 15; 
        
        ctx.beginPath();
        ctx.moveTo(shoulderX, shoulderY);
        ctx.lineTo(leftHandX, leftHandY); 
        ctx.stroke();
    }

    ctx.beginPath();
    ctx.moveTo(shoulderX, shoulderY);
    ctx.lineTo(elbowX, elbowY); 
    ctx.lineTo(handX, handY);   
    ctx.stroke();

    let muzzleOffset = (entity.weapon === 'sniper') ? 43 : (entity.weapon === 'shotgun') ? 45 : (entity.weapon === 'machineGun') ? 47 : 16;
    
    if (isPlayer && entity.shootTimer > 0 && !entity.isReloading && !['shield', 'melee'].includes(entity.weapon)) {
        ctx.save();
        ctx.translate(handX, handY);
        ctx.rotate(finalAimAngle);
        ctx.fillStyle = "orange";
        ctx.beginPath(); ctx.arc(muzzleOffset + 2, -1, 4 + Math.random()*3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "yellow";
        ctx.beginPath(); ctx.arc(muzzleOffset + 2, -1, 2 + Math.random()*2, 0, Math.PI*2); ctx.fill();
        ctx.restore();
    }

    if (isPlayer && !entity.isReloading && (!playerName && player.ammo[player.weapon] > 0 || playerName) && !['shield', 'melee'].includes(entity.weapon)) {
        let muzzleX = handX + Math.cos(finalAimAngle) * muzzleOffset;
        let muzzleY = handY + Math.sin(finalAimAngle) * muzzleOffset;
        
        ctx.strokeStyle = "rgba(255, 0, 0, 0.4)";
        ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(muzzleX, muzzleY); ctx.lineTo(aimTarget.x, aimTarget.y); ctx.stroke();
        
        if (entity.weapon === 'sniper') {
            ctx.fillStyle = "rgba(255, 0, 0, 0.5)";
            ctx.beginPath(); ctx.arc(entity.x + Math.cos(aimAngle) * weapons.sniper.minRange, (entity.y - 38) + Math.sin(aimAngle) * weapons.sniper.minRange, 5, 0, Math.PI*2); ctx.fill();
        }
    }

    if (isPlayer && entity.isReloading && !playerName) {
        ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center";
        let percent = Math.floor(player.reloadProgress * 100);
        ctx.fillText(`충전 중... ${percent}%`, entity.x, entity.y - 70);
    }

    if (playerName) {
        ctx.fillStyle = "white";
        ctx.font = "bold 12px Arial";
        ctx.textAlign = "center";
        ctx.fillText(playerName, entity.x, entity.y - 70);

        ctx.fillStyle = "red";
        ctx.fillRect(entity.x - 15, entity.y - 65, 30, 4);
        ctx.fillStyle = "#0f0";
        ctx.fillRect(entity.x - 15, entity.y - 65, 30 * (Math.max(0, entity.hp) / entity.maxHp), 4);
    }
}

// --- 렌더링 ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    canvas.style.cursor = 'none';

    ctx.save();
    ctx.translate(-camX, 0); 

    ctx.fillStyle = "#111"; 
    for (let chunk of terrainChunks) {
        if (chunk.length === 0) continue;
        
        ctx.beginPath();
        ctx.moveTo(chunk[0].x, chunk[0].y);
        for (let i = 1; i < chunk.length; i++) {
            ctx.lineTo(chunk[i].x, chunk[i].y);
        }
        
        ctx.lineTo(chunk[chunk.length - 1].x, canvas.height + 100);
        ctx.lineTo(chunk[0].x, canvas.height + 100);
        ctx.closePath();
        ctx.fill();
        
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(chunk[0].x, chunk[0].y);
        for (let i = 1; i < chunk.length; i++) {
            ctx.lineTo(chunk[i].x, chunk[i].y);
        }
        ctx.stroke();
    }

    for (let bar of barricades) {
        ctx.fillStyle = "#8B4513"; 
        ctx.fillRect(bar.x - bar.width/2, bar.y - bar.height, bar.width, bar.height);
        
        ctx.strokeStyle = "#5C3A21"; 
        ctx.lineWidth = 2;
        ctx.strokeRect(bar.x - bar.width/2, bar.y - bar.height, bar.width, bar.height);
        
        if (bar.y >= bar.targetY) {
            ctx.fillStyle = "red";
            ctx.fillRect(bar.x - bar.width/2, bar.y - bar.height - 10, bar.width, 4);
            ctx.fillStyle = "#0f0";
            ctx.fillRect(bar.x - bar.width/2, bar.y - bar.height - 10, bar.width * (Math.max(0, bar.hp) / bar.maxHp), 4);
        }
    }

    for (let item of items) {
        ctx.save();
        ctx.translate(item.x, item.y - 10); 
        
        ctx.fillStyle = "#2b2b2b";
        ctx.fillRect(-7, -10, 14, 20);
        
        ctx.fillStyle = "#111111";
        ctx.fillRect(-4, -8, 2, 16);
        ctx.fillRect(2, -8, 2, 16);

        ctx.fillStyle = "#d4af37";
        ctx.beginPath();
        ctx.arc(-2, -10, 2, Math.PI, 0);
        ctx.arc(2, -10, 2, Math.PI, 0);
        ctx.fill();
        
        ctx.strokeStyle = "rgba(255, 255, 0, 0.6)";
        ctx.lineWidth = 1.5;
        ctx.strokeRect(-8, -12, 16, 23);

        ctx.restore();
    }

    for (let e of enemies) {
        if (e.enemyType === 5) {
            ctx.save();
            ctx.translate(e.x, e.y);
            
            let hoverOffset = Math.sin(Date.now() / 150) * 4;
            ctx.translate(0, hoverOffset);

            let dir = (player.x - e.x) > 0 ? 1 : -1;

            ctx.fillStyle = "#cc0000";
            ctx.beginPath(); ctx.ellipse(0, 0, 12, 8, 0, 0, Math.PI * 2); ctx.fill();

            ctx.fillStyle = "#333"; ctx.fillRect(dir * 4, 4, dir * 8, 4);
            ctx.fillStyle = "#555"; ctx.fillRect(-12, -6, 2, 4); ctx.fillRect(10, -6, 2, 4);

            ctx.fillStyle = "rgba(200, 255, 255, 0.8)";
            let propWidth = 8 + Math.sin(Date.now() / 30) * 8; 
            ctx.fillRect(-11 - propWidth/2, -8, propWidth, 2);
            ctx.fillRect(11 - propWidth/2, -8, propWidth, 2);

            ctx.fillStyle = "cyan";
            ctx.beginPath(); ctx.arc(dir * 5, -1, 3, 0, Math.PI * 2); ctx.fill();
            ctx.restore();

            ctx.fillStyle = "red"; ctx.fillRect(e.x - 12, e.y - 20, 24, 4); 
            ctx.fillStyle = "#0f0"; ctx.fillRect(e.x - 12, e.y - 20, 24 * (Math.max(0, e.hp) / e.maxHp), 4);

        } else if (e.enemyType === 4) {
            ctx.save(); ctx.translate(e.x, e.y); ctx.scale(3, 3); ctx.translate(-e.x, -e.y);
            drawStickman(ctx, e, player, false);
            ctx.restore();

            ctx.fillStyle = "black"; ctx.fillRect(e.x - 52, e.y - 182, 104, 14); 
            ctx.fillStyle = "red"; ctx.fillRect(e.x - 50, e.y - 180, 100, 10); 
            ctx.fillStyle = "#0f0"; ctx.fillRect(e.x - 50, e.y - 180, 100 * (Math.max(0, e.hp) / e.maxHp), 10); 
            
            ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.textAlign = "center";
            ctx.fillText("!! BOSS !!", e.x, e.y - 190);

        } else if (e.enemyType === 3) {
            ctx.save(); ctx.translate(e.x, e.y); ctx.scale(0.7, 0.7); ctx.translate(-e.x, -e.y);
            drawStickman(ctx, e, player, false); ctx.restore();
            
            ctx.fillStyle = "red"; ctx.fillRect(e.x - 10, e.y - 60, 20, 5); 
            ctx.fillStyle = "#0f0"; ctx.fillRect(e.x - 10, e.y - 60, 20 * (Math.max(0, e.hp) / e.maxHp), 5);
        } else {
            drawStickman(ctx, e, player, false);
            ctx.fillStyle = "red"; ctx.fillRect(e.x - 10, e.y - 60, 20, 5); 
            ctx.fillStyle = "#0f0"; ctx.fillRect(e.x - 10, e.y - 60, 20 * (Math.max(0, e.hp) / e.maxHp), 5);
        }
    }

    let shootY = player.isCrouching ? player.y - 23 : player.y - 38;
    let dx = (mouse.x + camX) - player.x;
    let dy = mouse.y - shootY;
    let dist = Math.sqrt(dx*dx + dy*dy); 
    let baseAngle = Math.atan2(dy, dx); 
    let recoiledAngle = baseAngle - (player.recoil || 0); 
    
    let recoiledMouseXWorld = player.x + Math.cos(recoiledAngle) * dist;
    let recoiledMouseY = shootY + Math.sin(recoiledAngle) * dist;
    
    let recoiledMouseScreenX = recoiledMouseXWorld - camX;

    const mouseWorldPos = { x: recoiledMouseXWorld, y: recoiledMouseY };
    drawStickman(ctx, player, mouseWorldPos, true);

    for (let id in otherPlayers) {
        let op = otherPlayers[id];
        let opAimTarget = { x: op.x + Math.cos(op.aimAngle || 0) * 100, y: (op.y - 38) + Math.sin(op.aimAngle || 0) * 100 };
        drawStickman(ctx, op, opAimTarget, true, op.name);
    }

    if (player.crouchStamina < player.maxCrouchStamina) {
        let stamRatio = Math.max(0, player.crouchStamina) / player.maxCrouchStamina;
        ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.fillRect(player.x - 20, player.y - 75, 40, 6);
        ctx.fillStyle = "#00BFFF"; ctx.fillRect(player.x - 20, player.y - 75, 40 * stamRatio, 6);
        ctx.strokeStyle = "white"; ctx.lineWidth = 1; ctx.strokeRect(player.x - 20, player.y - 75, 40, 6);
    }

    for (let b of bullets) {
        ctx.fillStyle = b.color;
        ctx.beginPath(); ctx.arc(b.x, b.y, b.weaponType === 'sniper' ? 5 : 3, 0, Math.PI * 2); ctx.fill();
    }

    // 🚨 [추가] 쇼크웨이브(방패 타격) 렌더링
    for (let s of sparks) {
        if (s.type === 'shockwave') {
            ctx.strokeStyle = `rgba(0, 255, 255, ${s.life / 15})`;
            ctx.lineWidth = 3 + (15 - s.life); // 퍼지면서 선이 굵어졌다가 사라짐
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
            ctx.stroke();
        } else if (s.type === 'dust') {
            ctx.strokeStyle = `rgba(184, 134, 11, ${s.life / 30})`; 
            ctx.lineWidth = 2;
            ctx.beginPath();
            let w = s.size; let h = s.size;
            ctx.moveTo(s.x - w/2, s.y); ctx.lineTo(s.x - w/4, s.y - h); ctx.lineTo(s.x, s.y);
            ctx.lineTo(s.x + w/4, s.y - h); ctx.lineTo(s.x + w/2, s.y); ctx.stroke();
        } else {
            ctx.fillStyle = s.color ? s.color : "cyan"; 
            ctx.beginPath(); ctx.arc(s.x, s.y, s.life / 3, 0, Math.PI * 2); ctx.fill();
        }
    }

    ctx.restore(); 

    ctx.strokeStyle = "rgba(255, 0, 0, 0.8)"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(recoiledMouseScreenX, recoiledMouseY, 12, 0, Math.PI * 2); ctx.stroke();

    ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(recoiledMouseScreenX, recoiledMouseY, 2, 0, Math.PI * 2); ctx.fill();

    ctx.beginPath();
    ctx.moveTo(recoiledMouseScreenX, recoiledMouseY - 20); ctx.lineTo(recoiledMouseScreenX, recoiledMouseY - 8); 
    ctx.moveTo(recoiledMouseScreenX, recoiledMouseY + 20); ctx.lineTo(recoiledMouseScreenX, recoiledMouseY + 8); 
    ctx.moveTo(recoiledMouseScreenX - 20, recoiledMouseY); ctx.lineTo(recoiledMouseScreenX - 8, recoiledMouseY); 
    ctx.moveTo(recoiledMouseScreenX + 20, recoiledMouseY); ctx.lineTo(recoiledMouseScreenX + 8, recoiledMouseY); 
    ctx.stroke();
}

// --- 로그인 및 게임 시작 로직 ---
document.getElementById('startButton').addEventListener('click', () => {
    const nameInput = document.getElementById('playerNameInput').value.trim();
    const roomInput = parseInt(document.getElementById('roomNumberInput').value);

    if (!nameInput) {
        alert("이름을 입력해주세요!");
        return;
    }
    if (isNaN(roomInput) || roomInput < 1 || roomInput > 9) {
        alert("룸 번호는 1에서 9 사이의 숫자로 입력해주세요!");
        return;
    }

    globalPlayerName = nameInput;
    globalRoomNumber = roomInput;

    socket.emit('joinRoom', { name: globalPlayerName, room: globalRoomNumber });

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('gameCanvas').style.display = 'block';
    document.getElementById('ui').style.display = 'block';

    document.getElementById('playerInfoUI').innerText = `${globalPlayerName} (Room: ${globalRoomNumber})`;

    terrainSeed = globalRoomNumber * 12345;
    initTerrain();

    isGameStarted = true;
    lastEnemySpawn = Date.now();
    gameLoop();
});

generateTerrain();

</script>
</body>
